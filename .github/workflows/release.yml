name: Release CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  # Manual dispatches run from a branch ref, while tag pushes run from the
  # tag ref. Key both paths by the effective release tag to prevent duplicate
  # publication when the same tag is dispatched and pushed concurrently.
  group: palworld-save-facts-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare_oci:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.owner.outputs.value }}
    steps:
      - id: owner
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: palworld-save-facts-linux-x64
            archflags: ""
            cxxflags: ""
          - os: ubuntu-24.04-arm
            asset: palworld-save-facts-linux-arm64
            archflags: ""
            cxxflags: ""
          - os: macos-14
            asset: palworld-save-facts-macos-arm64
            archflags: "-arch arm64"
            cxxflags: "-std=c++11"
          - os: windows-latest
            asset: palworld-save-facts-windows-x64.exe
            archflags: ""
            cxxflags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build executable
        shell: bash
        env:
          ARCHFLAGS: ${{ matrix.archflags }}
          CXXFLAGS: ${{ matrix.cxxflags }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install vendor/PalworldSaveTools/src/palsav/palooz
          python -m pip install --no-deps vendor/PalworldSaveTools/src/palsav
          python -m pip install 'orjson>=3.11.8'
          python -m pip install '.[build]'
          pyinstaller --onefile --name '${{ matrix.asset }}' --collect-all palsav --collect-all palooz src/palworld_save_facts/__main__.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
  oci:
    needs: [build, prepare_oci]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ needs.prepare_oci.outputs.owner }}/palworld-save-facts:${{ inputs.tag || github.ref_name }}
  publish:
    needs: [build, oci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          # docker/build-push-action uploads a .dockerbuild record by default.
          # Downloading every artifact tries to extract that record alongside
          # executable assets and can fail publication after the OCI push.
          pattern: palworld-save-facts-*
          path: dist
          merge-multiple: true
      - name: Verify release assets and create checksum manifest
        run: |
          cd dist
          assets=(
            palworld-save-facts-linux-x64
            palworld-save-facts-linux-arm64
            palworld-save-facts-macos-arm64
            palworld-save-facts-windows-x64.exe
          )
          for asset in "${assets[@]}"; do
            test -f "$asset"
          done
          test "$(find . -maxdepth 1 -type f -name 'palworld-save-facts-*' | wc -l)" -eq "${#assets[@]}"
          sha256sum "${assets[@]}" > SHA256SUMS.txt
      - name: Generate release manifest and license inventory
        env:
          OCI_DIGEST: ${{ needs.oci.outputs.digest }}
          TAG: ${{ inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          dist = Path("dist")
          assets = sorted(path for path in dist.glob("palworld-save-facts-*") if path.is_file())
          prior = subprocess.check_output(["gh", "release", "list", "--limit", "1", "--json", "tagName", "--jq", ".[0].tagName // empty"], text=True).strip()
          manifest = {
              "schemaVersion": "palworld-save-facts/release-manifest/v1",
              "tag": os.environ["TAG"],
              "sourceSha": os.environ["GITHUB_SHA"],
              "decoderSha": subprocess.check_output(["git", "rev-parse", "HEAD:vendor/PalworldSaveTools"], text=True).strip(),
              "ociDigest": os.environ["OCI_DIGEST"],
              "compatibility": {"v1": "supported", "v2": "supported"},
              "rollbackVersion": prior or None,
              "assets": [{"name": path.name, "sha256": hashlib.sha256(path.read_bytes()).hexdigest()} for path in assets],
          }
          (dist / "release-manifest.json").write_text(json.dumps(manifest, sort_keys=True, separators=(",", ":")) + "\n")
          (dist / "license-inventory.json").write_text(json.dumps({"project": "GPL-3.0-or-later", "decoder": "GPL-3.0-or-later"}, sort_keys=True, separators=(",", ":")) + "\n")
          PY
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/SBOM.spdx.json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/release-manifest.json
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/palworld-save-facts-linux-x64
            dist/palworld-save-facts-linux-arm64
            dist/palworld-save-facts-macos-arm64
            dist/palworld-save-facts-windows-x64.exe
            dist/SHA256SUMS.txt
            dist/release-manifest.json
            dist/license-inventory.json
            dist/SBOM.spdx.json
