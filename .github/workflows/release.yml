name: Release CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: palworld-save-facts-linux-x64
            archflags: ""
            cxxflags: ""
          - os: macos-14
            asset: palworld-save-facts-macos-arm64
            archflags: "-arch arm64"
            cxxflags: "-std=c++11"
          - os: windows-latest
            asset: palworld-save-facts-windows-x64.exe
            archflags: ""
            cxxflags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build executable
        shell: bash
        env:
          ARCHFLAGS: ${{ matrix.archflags }}
          CXXFLAGS: ${{ matrix.cxxflags }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install vendor/PalworldSaveTools/src/palsav/palooz
          python -m pip install --no-deps vendor/PalworldSaveTools/src/palsav
          python -m pip install 'orjson>=3.11.8'
          python -m pip install '.[build]'
          pyinstaller --onefile --name '${{ matrix.asset }}' --collect-all palsav --collect-all palooz src/palworld_save_facts/__main__.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Verify release assets and create checksum manifest
        run: |
          cd dist
          assets=(
            palworld-save-facts-linux-x64
            palworld-save-facts-macos-arm64
            palworld-save-facts-windows-x64.exe
          )
          for asset in "${assets[@]}"; do
            test -f "$asset"
          done
          test "$(find . -maxdepth 1 -type f -name 'palworld-save-facts-*' | wc -l)" -eq "${#assets[@]}"
          sha256sum "${assets[@]}" > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/palworld-save-facts-linux-x64
            dist/palworld-save-facts-macos-arm64
            dist/palworld-save-facts-windows-x64.exe
            dist/SHA256SUMS.txt
